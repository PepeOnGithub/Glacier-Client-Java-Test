<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Glacier — Dressing Room</title>
<link rel="stylesheet" href="style.css">
<style>
  body { background:radial-gradient(120% 90% at 50% 0%, #233048, #0a0f1c); }
  .screen { position:fixed; inset:0; display:flex; flex-direction:column; padding:0 36px; }
  .top { display:flex; align-items:center; gap:14px; padding:22px 0 16px; }
  .top .logo { font-size:30px; } .top h1 { font-size:30px; flex:1; }
  .top .icon-btn { width:46px; height:46px; font-size:18px; }
  .body { flex:1; display:flex; gap:24px; padding-bottom:24px; min-height:0; }
  .preview { width:300px; border-radius:18px; background:linear-gradient(180deg, rgba(114,137,218,.15), rgba(0,0,0,.35));
    border:1px solid rgba(255,255,255,.06); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
  .avatar { width:120px; height:200px; border-radius:14px; background:linear-gradient(135deg,#b07a52,#6f4a2f);
    display:grid; place-items:center; font-size:70px; color:rgba(0,0,0,.5); box-shadow:0 12px 30px rgba(0,0,0,.5); }
  .preview b { font-size:18px; } .preview .rotate { color:var(--text-dim); font-size:13px; }
  .right { flex:1; display:flex; flex-direction:column; min-height:0; }
  .cats { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
  .cat { display:flex; align-items:center; gap:7px; padding:9px 16px; border-radius:11px; background:rgba(255,255,255,.04);
    color:var(--text-dim); cursor:pointer; transition:all .16s var(--ease); }
  .cat .fa { font-size:13px; } .cat:hover { color:var(--text); background:rgba(255,255,255,.08); }
  .cat.active { background:var(--accent); color:#fff; }
  .items { flex:1; overflow-y:auto; display:grid; grid-template-columns:repeat(4,1fr); gap:14px; align-content:start; }
  .it { border-radius:14px; background:var(--btn); cursor:pointer; padding:14px; text-align:center; animation:rise .25s var(--ease) both;
    border:1px solid rgba(255,255,255,.04); transition:transform .16s var(--ease), box-shadow .16s var(--ease); }
  .it:hover { transform:translateY(-3px); box-shadow:0 10px 22px rgba(0,0,0,.45); }
  .it.on { box-shadow:inset 0 0 0 1.5px var(--accent); }
  .it .ic { font-size:34px; color:var(--accent-soft); margin-bottom:8px; }
  .it .nm { font-size:13px; } .it .st { font-size:11px; color:var(--text-dim); margin-top:4px; } .it.on .st { color:var(--accent); }
</style>
</head>
<body>
  <div class="screen">
    <div class="top">
      <span class="logo"><img class="logo-img" src="logo.png" alt=""></span>
      <h1>Dressing Room</h1>
      <div class="icon-btn" data-nav="title.html" title="Back"><i class="fa">&#xf00d;</i></div>
    </div>
    <div class="body">
      <div class="preview">
        <div class="avatar"><i class="fa">&#xf007;</i></div>
        <b>ChikenWings5544</b>
        <div class="rotate"><i class="fa">&#xf021;</i> drag to rotate</div>
      </div>
      <div class="right">
        <div class="cats" id="cats"></div>
        <div class="items" id="items"></div>
      </div>
    </div>
  </div>
  <script src="bridge.js"></script>
  <script>
  const CATS = [["Capes","&#xf553;"],["Wings","&#xf72e;"],["Hats","&#xf521;"],["Bandanas","&#xf6d6;"],["Cloaks","&#xf553;"],["Pets","&#xf1b0;"]];
  const ITEMS = {
    Capes:["Aurora","Ember","Galaxy","None"], Wings:["Frost","Storm","Phoenix","None"],
    Hats:["Crown","Beanie","Cap","None"], Bandanas:["Polar","Ninja","Red","None"],
    Cloaks:["Shadow","Royal","None"], Pets:["Cub","Wolf","None"] };
  const equipped = { Capes:"Aurora", Wings:"None", Hats:"None", Bandanas:"Polar", Cloaks:"None", Pets:"Cub" };
  let cat="Capes";
  const catsEl=document.getElementById('cats'), itemsEl=document.getElementById('items');
  CATS.forEach(([c,ic])=>{ const e=document.createElement('div'); e.className='cat'+(c===cat?' active':'');
    e.innerHTML=`<i class="fa">${ic}</i>${c}`;
    e.onclick=()=>{ cat=c; [...catsEl.children].forEach(x=>x.classList.remove('active')); e.classList.add('active'); render(); };
    catsEl.appendChild(e); });
  function render(){ itemsEl.innerHTML=''; const ic=CATS.find(c=>c[0]===cat)[1];
    (ITEMS[cat]||[]).forEach((name,idx)=>{ const on=equipped[cat]===name;
      const d=document.createElement('div'); d.className='it'+(on?' on':''); d.style.animationDelay=(idx*0.03)+'s';
      d.innerHTML=`<div class="ic"><i class="fa">${name==='None'?'&#xf05e;':ic}</i></div><div class="nm">${name}</div><div class="st">${on?'Equipped':'Equip'}</div>`;
      d.onclick=()=>{ equipped[cat]=name; glacier.send('equip:'+cat+':'+name); render(); }; itemsEl.appendChild(d); }); }
  render();
  </script>
</body>
</html>
