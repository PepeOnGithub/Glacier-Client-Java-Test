<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Glacier — Marketplace</title>
<link rel="stylesheet" href="style.css">
<style>
  body { background:radial-gradient(120% 90% at 50% 0%, #2a3550, #0a0f1c); }
  .screen { position:fixed; inset:0; display:flex; flex-direction:column; padding:0 36px; }
  .top { display:flex; align-items:center; gap:14px; padding:22px 0 14px; }
  .top .logo { font-size:30px; } .top h1 { font-size:30px; flex:1; }
  .top .bal { display:flex; align-items:center; gap:8px; background:var(--btn); padding:8px 16px; border-radius:12px; font-size:18px; }
  .top .bal .fa { color:#ffcf4d; }
  .top .icon-btn { width:46px; height:46px; font-size:18px; }
  .tabs { display:flex; gap:10px; padding-bottom:16px; }
  .tab { padding:9px 20px; border-radius:11px; background:rgba(255,255,255,.04); color:var(--text-dim); cursor:pointer; transition:all .16s var(--ease); }
  .tab:hover { color:var(--text); background:rgba(255,255,255,.08); } .tab.active { background:var(--accent); color:#fff; }
  .grid { flex:1; min-height:0; overflow-y:auto; display:grid; grid-template-columns:repeat(4,1fr); gap:16px; padding-bottom:24px; align-content:start; }
  .item { border-radius:16px; background:var(--btn); overflow:hidden; cursor:pointer; animation:rise .3s var(--ease) both;
    transition:transform .18s var(--ease), box-shadow .18s var(--ease); border:1px solid rgba(255,255,255,.04); }
  .item:hover { transform:translateY(-4px); box-shadow:0 14px 30px rgba(0,0,0,.5); }
  .item .art { height:120px; display:grid; place-items:center; font-size:50px; color:var(--accent-soft);
    background:linear-gradient(160deg, rgba(114,137,218,.18), rgba(0,0,0,.2)); }
  .item .meta { padding:12px 14px; } .item .meta b { font-size:16px; } .item .meta small { color:var(--text-dim); display:block; margin-bottom:8px; }
  .buy { display:flex; align-items:center; justify-content:center; gap:7px; padding:8px; border-radius:10px; background:var(--accent); color:#fff; font-size:14px; }
  .buy.owned { background:rgba(255,255,255,.1); color:var(--text-dim); }
</style>
</head>
<body>
  <div class="screen">
    <div class="top">
      <span class="logo"><img class="logo-img" src="logo.png" alt=""></span>
      <h1>Marketplace</h1>
      <div class="bal"><i class="fa">&#xf3a5;</i> 2,450</div>
      <div class="icon-btn" data-nav="title.html" title="Back"><i class="fa">&#xf00d;</i></div>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="grid" id="grid"></div>
  </div>
  <script src="bridge.js"></script>
  <script>
    const TABS = ["Featured","Capes","Wings","Bandanas","Bundles","Emotes"];
    const ITEMS = [
      ["Aurora Cape","Capes","",1200,false],["Frost Wings","Wings","",1800,false],
      ["Polar Bandana","Bandanas","",600,true],["Glacier Bundle","Bundles","",2500,false],
      ["Wave Emote","Emotes","",400,false],["Ember Cape","Capes","",1200,false],
      ["Storm Wings","Wings","",1800,false],["Crown Hat","Featured","",900,false],
      ["Galaxy Cape","Capes","",1500,false],["Phoenix Wings","Wings","",2200,false],
      ["Ninja Bandana","Bandanas","",700,false],["Starter Bundle","Bundles","",1000,true]];
    function catIcon(c){var m={Capes:0xf553,Wings:0xf52d,Bandanas:0xf6fa,Bundles:0xf466,Emotes:0xf118,Featured:0xf005};return String.fromCharCode(m[c]||0xf005);}
    let cat = "Featured";
    const grid = document.getElementById('grid'), tabsEl = document.getElementById('tabs');
    TABS.forEach(t => {
      const e = document.createElement('div'); e.className = 'tab' + (t === cat ? ' active' : ''); e.textContent = t;
      e.onclick = () => { cat = t; [...tabsEl.children].forEach(c => c.classList.remove('active')); e.classList.add('active'); render(); };
      tabsEl.appendChild(e);
    });
    function render() {
      grid.innerHTML = '';
      ITEMS.filter(i => cat === 'Featured' || i[1] === cat).forEach((it, idx) => {
        const name = it[0], c = it[1], price = it[3], owned = it[4], icon = catIcon(c);
        const buy = owned ? 'Owned' : '<i class="fa">&#xf3a5;</i> ' + price;
        const card = document.createElement('div'); card.className = 'item'; card.style.animationDelay = (idx * 0.03) + 's';
        card.innerHTML = '<div class="art"><i class="fa">' + icon + '</i></div>' +
          '<div class="meta"><b>' + name + '</b><small>' + c + '</small>' +
          '<div class="buy ' + (owned ? 'owned' : '') + '">' + buy + '</div></div>';
        card.onclick = () => glacier.send('buy:' + name);
        grid.appendChild(card);
      });
    }
    render();
  </script>
</body>
</html>
