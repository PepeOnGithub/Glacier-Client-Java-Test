<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Glacier — Pause</title>
<link rel="stylesheet" href="style.css">
<style>
  body { background: transparent; } /* world shows through in-game */
  /* dim the frozen world so the panel stays readable while the game is still visible */
  .dim { position:fixed; inset:0; background:rgba(6,7,10,.5); }

  .widgets { position:fixed; left:18px; top:16px; display:flex; flex-direction:column; gap:10px; z-index:2; }
  .widget { display:flex; align-items:center; gap:10px; background:var(--btn); border-radius:12px; padding:8px 12px; }
  .widget .ic { width:30px; height:30px; border-radius:7px; background:rgba(255,255,255,.06); display:grid; place-items:center; color:var(--accent-soft); }
  .widget small { color:var(--text-dim); font-size:12px; display:block; } .widget b { color:var(--accent-soft); }

  /* flexbox centering — Ultralight's WebKit ignores grid place-items:center (panel stuck top-left) */
  .center { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; padding:24px; z-index:2; }
  .pause-panel { width:min(560px,100%); padding:22px; display:flex; flex-direction:column; gap:14px; animation:pop .3s var(--ease) both; }

  .pp-head { display:flex; align-items:center; gap:12px; }
  .pp-head .logo { font-size:30px; color:var(--accent); }
  .pp-head h2 { font-size:30px; flex:1; }
  .pp-head .icon-btn { width:46px; height:46px; font-size:20px; }

  .pp-row { display:flex; gap:12px; justify-content:center; }
  .pp-row .icon-btn { width:64px; height:52px; font-size:22px; }

  .verybig { height:54px; border-radius:16px; font-size:22px; }

  .slide { position:fixed; right:0; top:50%; transform:translateY(-50%); width:26px; height:54px;
    background:var(--btn); border-radius:14px 0 0 14px; display:grid; place-items:center; cursor:pointer;
    color:var(--text-dim); transition:background .18s var(--ease), color .18s var(--ease); }
  .slide:hover { background:var(--btn-hover); color:var(--text); }

  .corner { position:fixed; left:16px; bottom:16px; display:flex; gap:10px; }
  .corner .icon-btn { width:40px; height:40px; font-size:17px; }
</style>
</head>
<body>
  <div class="dim"></div>
  <div class="widgets fade-in">
    <div class="widget"><div class="ic"><i class="fa">&#xf007;</i></div><div><small>Logged in as:</small><b>ChikenWings5544</b></div></div>
    <div class="widget"><div class="ic"><img class="logo-img" src="logo.png" alt=""></div><div><small>Playing in:</small><b>My World</b></div></div>
    <div class="widget"><div class="ic"><i class="fa">&#xf28b;</i></div><div><small>Game Status:</small><b>Game is paused</b></div></div>
  </div>

  <div class="center">
    <div class="pause-panel panel">
      <div class="pp-head">
        <span class="logo"><img class="logo-img" src="logo.png" alt=""></span>
        <h2>Glacier</h2>
        <div class="icon-btn" data-act="info" title="Info"><i class="fa">&#xf05a;</i></div>
        <div class="icon-btn" data-act="inbox" title="Inbox"><i class="fa">&#xf0e0;</i></div>
        <div class="icon-btn" data-act="screenshot" title="Screenshot"><i class="fa">&#xf030;</i></div>
      </div>

      <div class="pill verybig" data-act="resume">Resume</div>

      <div class="pp-row">
        <div class="icon-btn" data-act="achievements" title="Achievements"><i class="fa">&#xf559;</i></div>
        <div class="icon-btn" data-nav="marketplace.html" title="Marketplace"><i class="fa">&#xf54e;</i></div>
        <div class="icon-btn" data-act="options" title="Options"><i class="fa">&#xf013;</i></div>
        <div class="icon-btn" data-nav="dressing.html" title="Dressing Room"><i class="fa">&#xf553;</i></div>
        <div class="icon-btn" data-act="profile" title="Profile"><i class="fa">&#xf007;</i></div>
      </div>

      <div class="pill verybig" data-act="quit">Save &amp; Quit</div>
    </div>
  </div>

  <div class="slide" data-act="sidebar"><i class="fa">&#xf053;</i></div>

  <div class="corner fade-in">
    <div class="icon-btn" data-nav="modmenu.html" title="Mod Menu"><i class="fa">&#xf009;</i></div>
    <div class="icon-btn" data-nav="hudeditor.html" title="HUD Editor"><i class="fa">&#xf304;</i></div>
  </div>

  <script src="bridge.js"></script>
</body>
</html>
