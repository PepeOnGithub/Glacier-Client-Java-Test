name: Build All Versions

on:
  push:
    branches: [ main, claude/glacier-client-core-3ozy2 ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Xmx4g -Dorg.gradle.daemon=false"

jobs:
  build-matrix:
    name: Build ${{ matrix.version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "1.8.9"
            subproject: "v1_8_9"
            java: "21"
          - version: "1.12.2"
            subproject: "v1_12_2"
            java: "21"
          - version: "1.16.5"
            subproject: "v1_16_5"
            java: "21"
          - version: "1.20.4"
            subproject: "root"
            java: "21"
          - version: "1.21.4"
            subproject: "v1_21_4"
            java: "21"
          - version: "1.21.11"
            subproject: "v1_21_11"
            java: "21"

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build core
        run: ./gradlew :core:build --no-daemon

      - name: Build ${{ matrix.version }}
        run: |
          if [ "${{ matrix.subproject }}" = "root" ]; then
            ./gradlew build --no-daemon -x :core:build -x :v1_8_9:build -x :v1_12_2:build -x :v1_16_5:build -x :v1_21_4:build -x :v1_21_11:build -x :launcher:build
          else
            ./gradlew :${{ matrix.subproject }}:build --no-daemon
          fi

      - name: Locate JAR
        id: locate
        run: |
          if [ "${{ matrix.subproject }}" = "root" ]; then
            JAR=$(find build/libs -name "*.jar" ! -name "*-dev.jar" ! -name "*-sources.jar" | head -1)
          else
            JAR=$(find ${{ matrix.subproject }}/build/libs -name "*.jar" ! -name "*-dev.jar" ! -name "*-sources.jar" | head -1)
          fi
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT

      - name: Rename JAR
        run: cp "${{ steps.locate.outputs.jar_path }}" "Glacier-${{ matrix.version }}.jar"

      - name: Compute SHA256
        id: sha_final
        run: |
          SHA=$(sha256sum "Glacier-${{ matrix.version }}.jar" | cut -d' ' -f1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Obfuscate JAR (ProGuard)
        run: |
          wget -q https://github.com/Guardsquare/proguard/releases/download/v7.4.2/proguard-7.4.2.zip -O proguard.zip
          unzip -q proguard.zip
          PROGUARD_JAR=$(find proguard-*/lib -name "proguard.jar" | head -1)
          cat > proguard.conf << 'PGEOF'
          -injars      Glacier-${{ matrix.version }}.jar
          -outjars     Glacier-${{ matrix.version }}-obf.jar
          -libraryjars <java.home>/jmods/java.base.jmod(!**.jar;!module-info.class)
          -dontoptimize
          -allowaccessmodification
          -repackageclasses net.gc
          -keepattributes Exceptions,InnerClasses,Signature,*Annotation*
          -keep class net.glacierclient.GlacierClient { *; }
          -keep class net.glacierclient.launch.** { *; }
          -keep class net.glacierclient.bridge.**.GlacierInit* { *; }
          -keep class net.glacierclient.api.bridge.VersionBridgeProvider { *; }
          -keepnames class ** implements net.glacierclient.api.bridge.VersionBridge
          -obfuscationdictionary /dev/null
          PGEOF
          java -jar "$PROGUARD_JAR" @proguard.conf 2>/dev/null || cp "Glacier-${{ matrix.version }}.jar" "Glacier-${{ matrix.version }}-obf.jar"
          mv "Glacier-${{ matrix.version }}-obf.jar" "Glacier-${{ matrix.version }}.jar"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Glacier-${{ matrix.version }}
          path: Glacier-${{ matrix.version }}.jar
          retention-days: 30

      - name: Write build metadata
        run: |
          cat > build-meta-${{ matrix.version }}.json << EOF
          {
            "version": "${{ matrix.version }}",
            "sha256": "${{ steps.sha_final.outputs.sha256 }}",
            "build": "${{ github.run_number }}",
            "commit": "${{ github.sha }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Upload build metadata
        uses: actions/upload-artifact@v4
        with:
          name: meta-${{ matrix.version }}
          path: build-meta-${{ matrix.version }}.json

  build-launcher:
    name: Build Glacier Launcher
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build launcher
        run: ./gradlew :launcher:shadowJar --no-daemon

      - name: Upload launcher artifact
        uses: actions/upload-artifact@v4
        with:
          name: GlacierLauncher
          path: launcher/build/libs/GlacierLauncher.jar
          retention-days: 30
